---
# Source: payment-chart/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment
---
# Source: payment-chart/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: payment
type: Opaque
stringData:
  DB_USERNAME: "admin"
  DB_PASSWORD: "password123"
---
# Source: payment-chart/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
data:
  APP_ENV: "qa"
---
# Source: payment-chart/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: payment
spec:
  type: ClusterIP
  selector:
    app: payment
  ports:
    - port: 80
      targetPort: 80
---
# Source: payment-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  labels:
    app: payment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      serviceAccountName: payment
      containers:
        - name: payment
          image: "nginx:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: payment
            - secretRef:
                name: payment
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 256Mi
---
# Source: payment-chart/templates/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Source: payment-chart/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment
spec:
  ingressClassName: nginx
  rules:
    - host: qa.payment.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: payment
                port:
                  number: 80
